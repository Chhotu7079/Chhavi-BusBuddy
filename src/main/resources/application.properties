spring.application.name=BusBuddy_Backend
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:}
app.security.jwt.expiration-ms=${APP_SECURITY_JWT_EXPIRATION_MS:604800000}
app.timezone=${APP_TIMEZONE:Asia/Kolkata}
app.cors-allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
firebase.database-url=${FIREBASE_DATABASE_URL:}